<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Interest - SB Construction</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2><i class="fas fa-building"></i> SB Construction</h2>
            </div>
            <a href="index.html" class="nav-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-form">
            <h1><i class="fas fa-user-plus"></i> Register Your Interest</h1>
            <p>Fill in your details to get product information and quotes.</p>
            
            <form id="leadForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="mobile">Mobile Number (10 digits)</label>
                    <input type="tel" id="mobile" name="mobile" required>
                    <small>Enter valid 10-digit mobile number</small>
                </div>
                <button type="submit" class="submit-btn"><i class="fas fa-paper-plane"></i> Submit</button>
            </form>
            
            <div id="message" class="message"></div>
        </div>
    </div>

    <a href="https://wa.me/919876543210" class="whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp"></i> WhatsApp
    </a>

    <script>
        const form = document.getElementById('leadForm');
        const message = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const mobile = document.getElementById('mobile').value.trim();

            // Validation
            if (!name) {
                showMessage('Please enter your name.', 'error');
                return;
            }
            if (!/^\d{10}$/.test(mobile)) {
                showMessage('Please enter a valid 10-digit mobile number.', 'error');
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/leads', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, mobile, timestamp: new Date().toISOString() }),
                });

                if (response.ok) {
                    showMessage('Thank you! Our team will contact you shortly.', 'success');
                    form.reset();
                } else {
                    showMessage('Submission failed. Please try again or contact us directly.', 'error');
                }
            } catch (error) {
                showMessage('Server not running? Start backend and try again, or contact us.', 'error');
            }
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
            setTimeout(() => {
                message.textContent = '';
                message.className = 'message';
            }, 5000);
        }
    </script>
</body>
</html>
